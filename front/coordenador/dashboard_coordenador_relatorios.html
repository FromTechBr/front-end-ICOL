<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatórios - ICOL</title>
  <script src="../assets/js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = {
      darkMode: "class",
      theme: { extend: { colors: { bordo: "#8B0006", laranja: "#F16C1F", vermelho: "#EE1A24", rosa: "#F7353F" }, fontFamily: { rounded: ['"Arial Rounded MT Bold"', 'Arial', 'sans-serif'] } } } };</script>
</head>
<body class="bg-gray-50 text-[#2a0507] antialiased transition-colors duration-300 dark:bg-[#120002] dark:text-white">
  <div class="min-h-screen md:flex">
    <aside class="bg-bordo px-5 py-6 text-white dark:bg-[#0a0002] dark:border-r dark:border-white/10 md:fixed md:inset-y-0 md:left-0 md:w-72">
      <div class="flex h-full flex-col">
        <a href="../tela_inicial.html"><img src="../../icol/icol-imagens/icol-colorida.png" alt="Logo ICOL" class="h-11 w-auto rounded-full bg-white/95 px-2 py-1" /></a>
        <button type="button" data-theme-toggle class="mt-8 inline-flex items-center justify-center gap-2 rounded-full border border-white/20 px-5 py-3 text-sm font-bold text-white transition hover:bg-white hover:text-bordo dark:hover:bg-white/10 dark:hover:text-white" aria-pressed="false">
          <span data-theme-icon aria-hidden="true">☾</span>Tema
        </button>
        <nav class="mt-10 flex flex-1 flex-col gap-2 text-sm font-semibold text-white/75" aria-label="Menu do coordenador">
          <a href="dashboard_coordenador.html" class="rounded-full px-5 py-3 transition hover:bg-white/10 hover:text-white">Início</a>
          <a href="dashboard_coordenador_cursos.html" class="rounded-full px-5 py-3 transition hover:bg-white/10 hover:text-white">Gestão de Cursos</a>
          <a href="dashboard_coordenador_professores.html" class="rounded-full px-5 py-3 transition hover:bg-white/10 hover:text-white">Professores</a>
          <a href="dashboard_coordenador_relatorios.html" class="rounded-full bg-white/15 px-5 py-3 text-white">Relatórios</a>
          <a href="dashboard_coordenador_mural.html" class="rounded-full px-5 py-3 transition hover:bg-white/10 hover:text-white">Gerenciar Mural</a>
        </nav>
        <a href="../tela_inicial.html" class="mt-8 rounded-full border border-white/20 px-5 py-3 text-center text-sm font-bold text-white transition hover:bg-white hover:text-bordo dark:hover:bg-white/10 dark:hover:text-white">Sair</a>
      </div>
    </aside>
    <main class="flex-1 px-4 py-8 md:ml-72 md:px-10 md:py-12">
      <div class="mx-auto max-w-6xl">
        <header class="rounded-3xl bg-white p-8 shadow-xl shadow-bordo/5 border border-transparent dark:border-white/10 dark:bg-white/5">
          <span class="text-sm font-bold uppercase tracking-[0.18em] text-laranja">Indicadores</span>
          <h1 class="mt-3 font-rounded text-4xl leading-tight text-bordo dark:text-white md:text-5xl">Relatórios</h1>
          <p class="mt-4 text-bordo/60 dark:text-white/70">Dados para apoiar decisões da coordenação.</p>
        </header>
        <section class="mt-8 grid gap-5 md:grid-cols-3">
          <article class="rounded-3xl bg-white p-7 shadow-xl shadow-bordo/5 border border-transparent dark:border-white/10 dark:bg-white/5">
            <p class="text-sm font-bold text-bordo/55 dark:text-white/70">Presença Média</p>
            <p class="mt-4 font-rounded text-5xl text-laranja">91%</p>
          </article>
          <article class="rounded-3xl bg-white p-7 shadow-xl shadow-bordo/5 border border-transparent dark:border-white/10 dark:bg-white/5">
            <p class="text-sm font-bold text-bordo/55 dark:text-white/70">Conclusão</p>
            <p class="mt-4 font-rounded text-5xl text-bordo dark:text-white">78%</p>
          </article>
          <article class="rounded-3xl bg-white p-7 shadow-xl shadow-bordo/5 border border-transparent dark:border-white/10 dark:bg-white/5">
            <p class="text-sm font-bold text-bordo/55 dark:text-white/70">Evasão</p>
            <p class="mt-4 font-rounded text-5xl text-vermelho">6%</p>
          </article>
        </section>
        <section class="mt-8 rounded-3xl bg-white p-7 shadow-xl shadow-bordo/5 border border-transparent dark:border-white/10 dark:bg-white/5">
          <h2 class="font-rounded text-2xl text-bordo dark:text-white">Relatórios disponíveis</h2>
          <div class="mt-6 grid gap-4 md:grid-cols-3">
            <button class="rounded-2xl bg-[#fff8f5] p-5 text-left font-bold text-bordo border border-transparent dark:border-white/10 dark:bg-white/5 dark:text-white transition hover:bg-laranja hover:text-white dark:hover:bg-white/10">Frequência mensal</button>
            <button class="rounded-2xl bg-[#fff8f5] p-5 text-left font-bold text-bordo border border-transparent dark:border-white/10 dark:bg-white/5 dark:text-white transition hover:bg-laranja hover:text-white dark:hover:bg-white/10">Desempenho por curso</button>
            <button class="rounded-2xl bg-[#fff8f5] p-5 text-left font-bold text-bordo border border-transparent dark:border-white/10 dark:bg-white/5 dark:text-white transition hover:bg-laranja hover:text-white dark:hover:bg-white/10">Matrículas e evasão</button>
          </div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
