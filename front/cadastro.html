<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha de Inscrição - ICOL</title>
  <script src="assets/js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            bordo: "#8B0006",
            laranja: "#F16C1F",
            vermelho: "#EE1A24",
            rosa: "#F7353F",
          },
          fontFamily: {
            rounded: ['"Arial Rounded MT Bold"', 'Arial', 'sans-serif'],
          },
        },
      },
    };
  </script>
</head>

<body class="bg-gray-50 text-[#2a0507] antialiased transition-colors duration-300 dark:bg-[#120002] dark:text-white flex min-h-screen items-center justify-center p-4 md:p-8">
  
  <button type="button" data-theme-toggle class="fixed top-4 right-4 z-50 inline-flex h-11 w-11 items-center justify-center rounded-full border border-bordo/10 bg-white text-bordo shadow-sm transition hover:border-laranja hover:text-laranja dark:border-white/10 dark:bg-[#1a0507] dark:text-white" aria-label="Alternar modo escuro">
    <span aria-hidden="true" data-theme-icon>☾</span>
  </button>

  <main class="w-full max-w-6xl overflow-hidden rounded-[2.5rem] bg-white shadow-2xl shadow-bordo/10 dark:bg-[#1a0507] dark:shadow-black/40 border border-transparent dark:border-white/10 flex flex-col md:flex-row">
    
    <!-- Left Column: Form -->
    <div class="flex-1 p-8 md:p-12 lg:p-16 flex flex-col justify-center">
      <a href="tela_inicial.html" class="inline-flex items-center gap-2 text-sm font-bold text-laranja transition hover:text-bordo dark:hover:text-white mb-8">
        <span>&larr;</span> Voltar para o Início
      </a>

      <h1 class="font-rounded text-4xl text-bordo dark:text-white md:text-5xl">Ficha de Inscrição</h1>
      <p class="mt-3 text-bordo/60 dark:text-white/60 mb-8">Preencha seus dados para demonstrar interesse nos projetos do ICOL.</p>

      <form action="#" method="POST" class="space-y-5">
        
        <div class="grid gap-5 md:grid-cols-2">
          <div class="space-y-1">
            <label for="nome" class="text-sm font-semibold text-bordo/80 dark:text-white/80">Nome completo</label>
            <input type="text" id="nome" name="nome" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-bordo outline-none transition focus:border-laranja focus:bg-white dark:border-white/10 dark:bg-white/5 dark:text-white dark:focus:border-laranja dark:focus:bg-white/10" placeholder="Seu nome completo" />
          </div>

          <div class="space-y-1">
            <label for="idade" class="text-sm font-semibold text-bordo/80 dark:text-white/80">Idade</label>
            <input type="number" id="idade" name="idade" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-bordo outline-none transition focus:border-laranja focus:bg-white dark:border-white/10 dark:bg-white/5 dark:text-white dark:focus:border-laranja dark:focus:bg-white/10" placeholder="Sua idade" />
          </div>
        </div>

        <div class="grid gap-5 md:grid-cols-2">
          <div class="space-y-1">
            <label for="cpf" class="text-sm font-semibold text-bordo/80 dark:text-white/80">CPF</label>
            <input type="text" id="cpf" name="cpf" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-bordo outline-none transition focus:border-laranja focus:bg-white dark:border-white/10 dark:bg-white/5 dark:text-white dark:focus:border-laranja dark:focus:bg-white/10" placeholder="000.000.000-00" />
          </div>

          <div class="space-y-1">
            <label for="telefone" class="text-sm font-semibold text-bordo/80 dark:text-white/80">Telefone / WhatsApp</label>
            <input type="tel" id="telefone" name="telefone" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-bordo outline-none transition focus:border-laranja focus:bg-white dark:border-white/10 dark:bg-white/5 dark:text-white dark:focus:border-laranja dark:focus:bg-white/10" placeholder="(16) 90000-0000" />
          </div>
        </div>

        <div class="space-y-1">
          <label for="endereco" class="text-sm font-semibold text-bordo/80 dark:text-white/80">Endereço completo</label>
          <input type="text" id="endereco" name="endereco" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-bordo outline-none transition focus:border-laranja focus:bg-white dark:border-white/10 dark:bg-white/5 dark:text-white dark:focus:border-laranja dark:focus:bg-white/10" placeholder="Rua, Número, Bairro, Cidade" />
        </div>

        <div class="space-y-1">
          <label for="curso" class="text-sm font-semibold text-bordo/80 dark:text-white/80">Projeto e Curso de Interesse</label>
          <select id="curso" name="curso" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-bordo outline-none transition focus:border-laranja focus:bg-white dark:border-white/10 dark:bg-white/5 dark:text-white dark:focus:border-laranja dark:focus:bg-white/10">
            <option value="" disabled selected class="dark:text-black">Selecione um projeto e curso</option>
            <optgroup label="Projeto Aleph" class="dark:text-black">
              <option value="reforco-escolar" class="dark:text-black">Reforço Escolar</option>
              <option value="mentoria-academica" class="dark:text-black">Mentoria Acadêmica</option>
              <option value="rotinas-com-ia" class="dark:text-black">Rotinas com IA</option>
            </optgroup>
            <optgroup label="Cursos Livres" class="dark:text-black">
              <option value="informatica-basica" class="dark:text-black">Informática Básica</option>
              <option value="assistente-administrativo" class="dark:text-black">Assistente Administrativo</option>
              <option value="atendimento-vendas" class="dark:text-black">Atendimento e Vendas</option>
            </optgroup>
            <optgroup label="Projeto Bem-Viver" class="dark:text-black">
              <option value="inclusao-digital-50" class="dark:text-black">Inclusão Digital 50+</option>
              <option value="oficina-memoria" class="dark:text-black">Oficina de Memória</option>
              <option value="bem-estar-integral" class="dark:text-black">Bem-Estar Integral</option>
            </optgroup>
          </select>
        </div>

        <div class="space-y-1">
          <label for="renda" class="text-sm font-semibold text-bordo/80 dark:text-white/80">Declaração Socioeconômica (Renda Familiar)</label>
          <select id="renda" name="renda" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-bordo outline-none transition focus:border-laranja focus:bg-white dark:border-white/10 dark:bg-white/5 dark:text-white dark:focus:border-laranja dark:focus:bg-white/10">
            <option value="" disabled selected class="dark:text-black">Selecione a faixa de renda</option>
            <option value="ate-1" class="dark:text-black">Até 1 salário mínimo</option>
            <option value="1-a-3" class="dark:text-black">De 1 a 3 salários mínimos</option>
            <option value="3-a-5" class="dark:text-black">De 3 a 5 salários mínimos</option>
            <option value="mais-5" class="dark:text-black">Mais de 5 salários mínimos</option>
          </select>
        </div>

        <div class="mt-6 rounded-2xl bg-laranja/10 p-5 border border-laranja/20 dark:bg-laranja/5 dark:border-laranja/20 flex items-start gap-4">
          <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-laranja text-white">
            !
          </span>
          <div>
            <p class="text-sm font-bold text-laranja">Atenção</p>
            <p class="mt-1 text-sm leading-6 text-bordo/75 dark:text-white/70">O envio deste formulário passará por uma análise da coordenação. A efetivação da matrícula não é imediata e está sujeita à disponibilidade de vagas e perfil do projeto.</p>
          </div>
        </div>

        <div class="pt-4">
          <button type="submit" class="w-full rounded-xl bg-bordo px-8 py-4 text-sm font-bold uppercase tracking-[0.12em] text-white shadow-xl shadow-bordo/20 transition hover:-translate-y-0.5 hover:bg-[#6f0005] dark:shadow-none">
            Enviar Inscrição
          </button>
        </div>

      </form>
    </div>

    <!-- Right Column: Abstract Graphic -->
    <div class="hidden md:flex flex-1 relative overflow-hidden bg-gradient-to-br from-bordo via-[#2a0507] to-black items-center justify-center p-12">
      <!-- Decorative Elements -->
      <div class="absolute -top-32 -right-32 h-96 w-96 rounded-full bg-laranja/20 blur-3xl"></div>
      <div class="absolute -bottom-32 -left-32 h-96 w-96 rounded-full bg-rosa/10 blur-3xl"></div>
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_30%_30%,rgba(255,255,255,0.05),transparent_25%),linear-gradient(135deg,rgba(255,255,255,0.02),transparent_40%)]"></div>
      
      <!-- Glassmorphism Center -->
      <div class="relative z-10 flex h-64 w-64 items-center justify-center rounded-full border border-white/10 bg-white/5 p-8 shadow-2xl backdrop-blur-xl">
        <img src="../icol/icol-imagens/icol-colorida.png" alt="Logo ICOL" class="h-auto w-full object-contain drop-shadow-2xl brightness-110" />
      </div>

      <!-- Accent Rings -->
      <div class="absolute top-1/2 left-1/2 h-[500px] w-[500px] -translate-x-1/2 -translate-y-1/2 rounded-full border border-white/5"></div>
      <div class="absolute top-1/2 left-1/2 h-[700px] w-[700px] -translate-x-1/2 -translate-y-1/2 rounded-full border border-white/5"></div>
    </div>

  </main>
</body>
</html>
